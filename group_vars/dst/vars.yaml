dst_user: dst
dst_home: /opt/dst
steamcmd_dir: /opt/steamcmd
dst_install_dir: "{{ dst_home }}/server"

dst_mods:
  - "378160973"   # Global Positions
  - "1803285852"  # Auto Stack and Pick Up
  - "3149615843"  # Durability Tweaks Continued
  - "764204839"   # Automatic Health Adjust
  - "1185229307"  # Epic Healthbar
  - "375859599"   # Health Info
  - "2189004162"  # Insight (Show Me+)

# YAML anchors — reused across clusters to avoid repetition
_modoverrides: &modoverrides |
  return {
    ["workshop-378160973"]  = { configuration_options = {}, enabled = true },
    ["workshop-1803285852"] = { configuration_options = {}, enabled = true },
    ["workshop-3149615843"] = { configuration_options = { weapons = 4, armors = 4, workTools = 4, tools = 4, staves = 4, amulets = 4, gold = 4, ruins = 4, dark = 4, lunar = 4, shadow = 4, clothing = 4, saddles = 4 }, enabled = true },
    ["workshop-764204839"]  = { configuration_options = {}, enabled = true },
    ["workshop-1185229307"] = { configuration_options = {}, enabled = true },
    ["workshop-375859599"]  = { configuration_options = {}, enabled = true },
    ["workshop-2189004162"] = { configuration_options = {}, enabled = true },
  }

_master_world_overrides: &master_world_overrides |
        portalresurection = "always",
        carrot = "often",
        berrybush = "often",
        berrybush2 = "often",
        flower = "often",

dst_clusters:
  - name: NOFEAR
    description: "No Fear. No Mercy. Just Survive."
    password: "{{ vault_dst_password }}"
    token: "{{ vault_dst_token }}"
    cluster_key: "{{ vault_dst_cluster_key }}"
    max_players: 6
    pvp: false
    master_port: 10999
    caves_port: 11000
    steam_master_port: 27016
    steam_auth_port: 8766
    caves_steam_master_port: 27017
    caves_steam_auth_port: 8767
    shard_master_port: 10998
    master_world_preset: "SURVIVAL_TOGETHER"
    caves_world_preset: "DST_CAVE"
    master_world_overrides: *master_world_overrides
    caves_world_overrides: ""
    modoverrides_master: *modoverrides
    modoverrides_caves: *modoverrides

  - name: JAGUARAS
    description: "No Fear. No Mercy. Just Survive."
    password: "{{ vault_dst_password }}"
    token: "{{ vault_dst_token }}"
    cluster_key: "{{ vault_dst_cluster_key }}"
    max_players: 6
    pvp: false
    master_port: 11001
    caves_port: 11002
    steam_master_port: 27018
    steam_auth_port: 8768
    caves_steam_master_port: 27019
    caves_steam_auth_port: 8769
    shard_master_port: 10997
    master_world_preset: "SURVIVAL_TOGETHER"
    caves_world_preset: "DST_CAVE"
    master_world_overrides: *master_world_overrides
    caves_world_overrides: ""
    modoverrides_master: *modoverrides
    modoverrides_caves: *modoverrides

cluster_intention: cooperative
cluster_lan_only: false
cluster_offline: false
whitelist_slots: 0

enable_ufw: true
