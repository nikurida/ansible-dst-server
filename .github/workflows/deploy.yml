name: Deploy DST with Ansible

on:
  workflow_dispatch:
    inputs:
      reset_world:
        description: "Reset world (wipe save data and restart)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  push:
    branches: [ "main" ]

concurrency:
  group: dst-deploy
  cancel-in-progress: true

jobs:
  plan:
    name: Plan (Ansible dry-run)
    runs-on: ubuntu-latest
    env:
      ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
      ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
      ANSIBLE_HOST_KEY_CHECKING: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            "${ANSIBLE_USER}@${ANSIBLE_HOST}" 'echo "SSH OK: $(hostname)"'

      - name: Write inventory.ini
        run: |
          cat > inventory.ini <<EOF
          [dst]
          dst-host ansible_host=${ANSIBLE_HOST} ansible_user=${ANSIBLE_USER}
          EOF

      - name: Write Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass.txt
          chmod 600 .vault_pass.txt

      - name: Dry-run (check mode)
        run: |
          ansible-playbook -i inventory.ini site.yml \
            --vault-password-file .vault_pass.txt \
            --private-key ~/.ssh/deploy_key \
            --check --diff \
            -e "ansible_python_interpreter=/usr/bin/python3"

  deploy:
    name: Deploy (apply)
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    env:
      ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
      ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
      ANSIBLE_HOST_KEY_CHECKING: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 \
            -i ~/.ssh/deploy_key \
            "${ANSIBLE_USER}@${ANSIBLE_HOST}" 'echo "SSH OK: $(hostname)"'

      - name: Write inventory.ini
        run: |
          cat > inventory.ini <<EOF
          [dst]
          dst-host ansible_host=${ANSIBLE_HOST} ansible_user=${ANSIBLE_USER}
          EOF

      - name: Write Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass.txt
          chmod 600 .vault_pass.txt

      - name: Apply (run Ansible)
        run: |
          ansible-playbook -i inventory.ini site.yml \
            --vault-password-file .vault_pass.txt \
            --private-key ~/.ssh/deploy_key \
            -e "ansible_python_interpreter=/usr/bin/python3"

      - name: Health check
        run: |
          echo "Waiting 60s for shards to initialise..."
          sleep 60
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            "${ANSIBLE_USER}@${ANSIBLE_HOST}" \
            'set -e
            for shard in dst-nofear-master dst-nofear-caves; do
              state=$(systemctl is-active "$shard")
              echo "$shard: $state"
              [ "$state" = "active" ] || { echo "FAIL: $shard is not active"; exit 1; }
            done
            echo "All shards healthy"'

  reset:
    name: Reset world
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.reset_world == 'true'
    environment: production
    env:
      ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
      ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
    steps:
      - name: Write SSH private key
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wipe save data and restart
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key \
            "${ANSIBLE_USER}@${ANSIBLE_HOST}" \
            'set -e
            systemctl stop dst-nofear-master dst-nofear-caves
            rm -rf /opt/dst/.klei/DoNotStarveTogether/NOFEAR/Master/save
            rm -rf /opt/dst/.klei/DoNotStarveTogether/NOFEAR/Caves/save
            systemctl start dst-nofear-master dst-nofear-caves
            echo "World reset complete"'
