name: Deploy DST with Ansible

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: dst-deploy
  cancel-in-progress: true

jobs:
  plan:
    name: Plan (Ansible dry-run)
    runs-on: ubuntu-latest
    env:
      ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
      ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
      ANSIBLE_HOST_KEY_CHECKING: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -i ~/.ssh/deploy_key \
            "${ANSIBLE_USER}@${ANSIBLE_HOST}" 'echo "SSH OK: $(hostname)"'

      - name: Write inventory.ini
        run: |
          cat > inventory.ini <<EOF
          [dst]
          dst-host ansible_host=${ANSIBLE_HOST} ansible_user=${ANSIBLE_USER}
          EOF

      - name: Write Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass.txt
          chmod 600 .vault_pass.txt

      - name: Dry-run (check mode)
        run: |
          ansible-playbook -i inventory.ini site.yml \
            --vault-password-file .vault_pass.txt \
            --private-key ~/.ssh/deploy_key \
            --check --diff \
            -e "ansible_python_interpreter=/usr/bin/python3"

  deploy:
    name: Deploy (apply)
    runs-on: ubuntu-latest
    needs: plan
    environment: production
    env:
      ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
      ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
      ANSIBLE_HOST_KEY_CHECKING: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Write SSH private key
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -i ~/.ssh/deploy_key \
            "${ANSIBLE_USER}@${ANSIBLE_HOST}" 'echo "SSH OK: $(hostname)"'

      - name: Write inventory.ini
        run: |
          cat > inventory.ini <<EOF
          [dst]
          dst-host ansible_host=${ANSIBLE_HOST} ansible_user=${ANSIBLE_USER}
          EOF

      - name: Write Vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass.txt
          chmod 600 .vault_pass.txt

      - name: Apply (run Ansible)
        run: |
          ansible-playbook -i inventory.ini site.yml \
            --vault-password-file .vault_pass.txt \
            --private-key ~/.ssh/deploy_key \
            -e "ansible_python_interpreter=/usr/bin/python3"
