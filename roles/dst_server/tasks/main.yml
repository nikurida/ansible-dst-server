- name: Update and upgrade all packages (including kernel)
  apt:
    update_cache: true
    upgrade: full
    autoremove: true

- name: Install dependencies
  apt:
    name:
      - lib32gcc-s1
      - lib32stdc++6
      - curl
      - unzip
      - ca-certificates
      - ufw
      - tmux
      - needrestart
      - unattended-upgrades
    state: present

- name: Enable automatic security updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Reboot if kernel was updated
  reboot:
    reboot_timeout: 120
    msg: "Rebooting after kernel update"
  when: ansible_facts['kernel'] is defined
  ignore_errors: true
  register: reboot_result

- name: Check if reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if required
  reboot:
    reboot_timeout: 120
  when: reboot_required.stat.exists

- name: Create dst user
  user:
    name: "{{ dst_user }}"
    home: "{{ dst_home }}"
    shell: /bin/bash
    create_home: true

- name: Create base directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0755"
  loop:
    - "{{ steamcmd_dir }}"
    - "{{ dst_install_dir }}"

- name: Download SteamCMD
  get_url:
    url: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
    dest: /tmp/steamcmd_linux.tar.gz
    mode: "0644"

- name: Extract SteamCMD
  unarchive:
    src: /tmp/steamcmd_linux.tar.gz
    dest: "{{ steamcmd_dir }}"
    remote_src: true
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Install/Update DST dedicated server (App ID 343050)
  become_user: "{{ dst_user }}"
  shell: |
    "{{ steamcmd_dir }}/steamcmd.sh" \
      +login anonymous \
      +force_install_dir "{{ dst_install_dir }}" \
      +app_update 343050 validate \
      +quit
  args:
    creates: "{{ dst_install_dir }}/bin"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create Klei cluster structure
  file:
    path: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/{{ item }}"
    state: directory
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0755"
  loop:
    - Master
    - Caves

- name: Write cluster token
  copy:
    content: "{{ dst_token | trim }}"
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/cluster_token.txt"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0600"

- name: Generate cluster.ini
  template:
    src: cluster.ini.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/cluster.ini"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"

- name: Generate server.ini (Master)
  template:
    src: server_master.ini.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/Master/server.ini"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"

- name: Generate server.ini (Caves)
  template:
    src: server_caves.ini.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/Caves/server.ini"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"

- name: Generate worldgenoverride.lua (Master)
  template:
    src: worldgenoverride.lua.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/Master/worldgenoverride.lua"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"
  vars:
    world_preset: "{{ master_world_preset }}"

- name: Generate worldgenoverride.lua (Caves)
  template:
    src: worldgenoverride.lua.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/Caves/worldgenoverride.lua"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"
  vars:
    world_preset: "{{ caves_world_preset }}"

- name: Create mods directory
  file:
    path: "{{ dst_install_dir }}/mods"
    state: directory
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0755"

- name: Deploy dedicated_server_mods_setup.lua
  template:
    src: dedicated_server_mods_setup.lua.j2
    dest: "{{ dst_install_dir }}/mods/dedicated_server_mods_setup.lua"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"

- name: Create modoverrides.lua (Master)
  template:
    src: modoverrides.lua.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/Master/modoverrides.lua"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"
  vars:
    modoverrides_body: "{{ modoverrides_master }}"

- name: Create modoverrides.lua (Caves)
  template:
    src: modoverrides.lua.j2
    dest: "{{ dst_home }}/.klei/DoNotStarveTogether/{{ dst_cluster_name }}/Caves/modoverrides.lua"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"
  vars:
    modoverrides_body: "{{ modoverrides_caves }}"

- name: Deploy systemd service files
  template:
    src: "{{ item.src }}"
    dest: "/etc/systemd/system/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "dst-master.service.j2", dest: "dst-master.service" }
    - { src: "dst-caves.service.j2",  dest: "dst-caves.service" }
  notify: Reload systemd

- name: Enable and start DST services
  systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - dst-master.service
    - dst-caves.service
  ignore_errors: "{{ ansible_check_mode }}"

- name: Configure UFW firewall
  when: enable_ufw
  block:
    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny
    - name: Allow SSH
      ufw:
        rule: allow
        name: OpenSSH
    - name: Allow DST master UDP port
      ufw:
        rule: allow
        proto: udp
        port: "{{ dst_master_port }}"
    - name: Allow DST caves UDP port
      ufw:
        rule: allow
        proto: udp
        port: "{{ dst_caves_port }}"
    - name: Allow DST steam master ports
      ufw:
        rule: allow
        proto: udp
        port: "{{ item }}"
      loop:
        - "{{ dst_steam_master_port }}"
        - "{{ dst_caves_steam_master_port }}"
