- name: Update and upgrade all packages (including kernel)
  apt:
    update_cache: true
    upgrade: full
    autoremove: true

- name: Install dependencies
  apt:
    name:
      - lib32gcc-s1
      - lib32stdc++6
      - curl
      - unzip
      - ca-certificates
      - ufw
      - tmux
      - needrestart
      - unattended-upgrades
    state: present

- name: Enable automatic security updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

- name: Configure sshd for CI/CD compatibility
  blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED - SSH hardening"
    block: |
      PerSourcePenalties no
      MaxAuthTries 3
  notify: Reload sshd

- name: Reboot if kernel was updated
  reboot:
    reboot_timeout: 120
    msg: "Rebooting after kernel update"
  when: ansible_facts['kernel'] is defined
  ignore_errors: true
  register: reboot_result

- name: Check if reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if required
  reboot:
    reboot_timeout: 120
  when: reboot_required.stat.exists

- name: Create dst user
  user:
    name: "{{ dst_user }}"
    home: "{{ dst_home }}"
    shell: /bin/bash
    create_home: true

- name: Create base directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0755"
  loop:
    - "{{ steamcmd_dir }}"
    - "{{ dst_install_dir }}"

- name: Download SteamCMD
  get_url:
    url: https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz
    dest: /tmp/steamcmd_linux.tar.gz
    mode: "0644"

- name: Extract SteamCMD
  unarchive:
    src: /tmp/steamcmd_linux.tar.gz
    dest: "{{ steamcmd_dir }}"
    remote_src: true
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Install/Update DST dedicated server (App ID 343050)
  become_user: "{{ dst_user }}"
  shell: |
    "{{ steamcmd_dir }}/steamcmd.sh" \
      +force_install_dir "{{ dst_install_dir }}" \
      +login anonymous \
      +app_update 343050 validate \
      +quit
  args:
    creates: "{{ dst_install_dir }}/bin64"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Create mods directory
  file:
    path: "{{ dst_install_dir }}/mods"
    state: directory
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0755"

- name: Deploy dedicated_server_mods_setup.lua
  template:
    src: dedicated_server_mods_setup.lua.j2
    dest: "{{ dst_install_dir }}/mods/dedicated_server_mods_setup.lua"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    mode: "0644"

- name: Stop and disable legacy single-cluster service names
  systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - dst-master.service
    - dst-caves.service
  ignore_errors: true

- name: Remove legacy systemd service files
  file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop:
    - dst-master.service
    - dst-caves.service
  notify: Reload systemd

- name: Configure clusters
  include_tasks: configure_cluster.yml
  loop: "{{ dst_clusters }}"
  loop_control:
    loop_var: cluster
    label: "{{ cluster.name }}"

- name: Configure UFW firewall
  when: enable_ufw
  block:
    - name: Enable UFW
      ufw:
        state: enabled
        policy: deny

    - name: Allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Allow DST UDP ports
      ufw:
        rule: allow
        proto: udp
        port: "{{ item | string }}"
      loop: >-
        {{
          dst_clusters | map(attribute='master_port') | list +
          dst_clusters | map(attribute='caves_port') | list +
          dst_clusters | map(attribute='steam_master_port') | list +
          dst_clusters | map(attribute='caves_steam_master_port') | list
        }}
