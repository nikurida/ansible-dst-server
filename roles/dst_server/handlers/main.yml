- name: Restart DST services
  systemd:
    name: "dst-{{ item.0.name | lower }}-{{ item.1 }}.service"
    state: restarted
  loop: "{{ dst_clusters | product(['master', 'caves']) | list }}"
  ignore_errors: "{{ ansible_check_mode }}"

- name: Fix permissions for SteamCMD
  file:
    path: "{{ steamcmd_dir }}"
    owner: "{{ dst_user }}"
    group: "{{ dst_user }}"
    recurse: true

- name: Reload systemd
  systemd:
    daemon_reload: true

- name: Reload sshd
  service:
    name: sshd
    state: reloaded
